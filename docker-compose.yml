services:
  db:
    image: mariadb:latest
    container_name: ${ROUTER}-db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
      MYSQL_DATABASE: ${DB_DATABASE}
      MYSQL_USER: ${DB_USER}
      MYSQL_PASSWORD: ${DB_PASSWORD}
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ${ROUTER}-app
    restart: always
    ports:
      - "3000:3000"
    environment:
      - DB_HOST=db
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_DATABASE=${DB_DATABASE}
    depends_on:
      - db

  phpmyadmin:
    image: phpmyadmin:latest
    container_name: ${ROUTER}-phpmyadmin
    restart: always
    environment:
      PMA_HOST: db  # Tells phpMyAdmin to connect to the service named 'mariadb'
    depends_on:
      - db
    ports:
      - "8091:80"  

volumes:
  db_data:
