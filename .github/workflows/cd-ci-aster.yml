name: CI/CD Pipeline - Next.js Docker

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

env:
  DOCKERHUB_USERNAME: captwhite
  IMAGE_NAME: captwhite/administracio 

jobs:
  ci_build:
    runs-on: ubuntu-latest
    steps:
      - name: ⬇️ Checkout code
        uses: actions/checkout@v4

      - name: 🛠️ Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm' # Cache de npm para acelerar el proceso

      - name: 📦 Install dependencies
        run: npm ci

      - name: 🔑 Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ env.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: ⚙️ Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: 🏗️ Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:latest
            ${{ env.IMAGE_NAME }}:${{ github.sha }}
          # Next.js genera muchas capas, el cache gha es vital aquí
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: ci_build
    runs-on: ubuntu-latest
    steps:
      - name: ⬇️ Checkout code
        uses: actions/checkout@v4

      - name: 📤 Sync files to VPS
        uses: appleboy/scp-action@v0.1.4
        with:
          host: ${{ secrets.SSH_HOST_ASTER }}
          username: ${{ secrets.SSH_USER_ASTER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 22 # Asegúrate de que el puerto sea el correcto
          source: "docker-compose-aster.yml"
          target: "/opt/workspaces/administracio/"
          debug: true

      - name: 🚀 Deploy containers and restart service
        uses: appleboy/ssh-action@v1.0.1
        with:
          host: ${{ secrets.SSH_HOST_ASTER }}
          username: ${{ secrets.SSH_USER_ASTER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            echo "Iniciando despliegue de Next.js..."
            cd /opt/workspaces/administracio

            echo "Configurando variables de entorno (.env)..."
            # Importante: Next.js suele necesitar variables en build-time o runtime
            echo "DB_ROOT_PASSWORD=${{ secrets.DB_ROOT_PASSWORD }}" > .env
            echo "DB_DATABASE=${{ secrets.DB_DATABASE }}" >> .env
            echo "DB_USER=${{ secrets.DB_USER }}" >> .env
            echo "DB_PASSWORD=${{ secrets.DB_PASSWORD }}" >> .env
            echo "DB_HOST=db" >> .env

            echo "Actualizando imágenes y reiniciando..."
            docker compose -f docker-compose-aster.yml pull
            docker compose -f docker-compose-aster.yml up -d --remove-orphans
            
            echo "Limpiando imágenes antiguas..."
            docker image prune -f
            
            echo "✅ Despliegue completado con éxito." 

