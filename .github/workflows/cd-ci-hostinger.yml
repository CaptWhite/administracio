name: CI/CD Pipeline - Next.js Docker

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

env:
  DOCKERHUB_USERNAME: captwhite
  IMAGE_NAME: captwhite/administracio 

jobs:
  ci_build:
    runs-on: ubuntu-latest
    steps:
      - name: ⬇️ Checkout code
        uses: actions/checkout@v4

      - name: 🛠️ Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm' # Cache de npm para acelerar el proceso

      - name: 📦 Install dependencies
        run: npm ci

      - name: 🔑 Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ env.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: ⚙️ Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: 🏗️ Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:latest
            ${{ env.IMAGE_NAME }}:${{ github.sha }}
          # Next.js genera muchas capas, el cache gha es vital aquí
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: ci_build
    runs-on: ubuntu-latest
    steps:
      - name: ⬇️ Checkout code
        uses: actions/checkout@v4

      - name: 📤 Sync files to VPS
        uses: appleboy/scp-action@v0.1.4
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          # Asegúrate de que el nombre del fichero coincida con el tuyo
          source: "docker-compose-prod.yml"
          target: "/home/${{ secrets.SSH_USER }}/workspaces/nextjs-app/"

      - name: 🚀 Deploy containers and restart service
        uses: appleboy/ssh-action@v1.0.1
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            echo "Iniciando despliegue de Next.js..."
            cd /home/${{ secrets.SSH_USER }}/workspaces/nextjs-app

            echo "Configurando variables de entorno (.env)..."
            # Importante: Next.js suele necesitar variables en build-time o runtime
            echo "DATABASE_URL=${{ secrets.DATABASE_URL }}" > .env
            echo "NEXT_PUBLIC_API_URL=${{ secrets.NEXT_PUBLIC_API_URL }}" >> .env
            echo "PRIVATE_KEY=${{ secrets.APPL_PRIVATE_KEY }}" >> .env
            echo "CLIENT_EMAIL=${{ secrets.APPL_CLIENT_EMAIL }}" >> .env

            echo "Actualizando imágenes y reiniciando..."
            docker compose -f docker-compose-prod.yml pull
            docker compose -f docker-compose-prod.yml up -d --remove-orphans
            
            echo "Limpiando imágenes antiguas..."
            docker image prune -f
            
            echo "✅ Despliegue completado con éxito."
